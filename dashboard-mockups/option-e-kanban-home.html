<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option E - Kanban Home</title>
  <style>
    body{margin:0;background:#0d0d10;color:#fff;font-family:Inter,system-ui,sans-serif} .wrap{max-width:980px;margin:0 auto;padding:16px}
    h1{margin:0 0 10px}.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .col{background:#17171b;border:1px solid #282832;border-radius:14px;padding:10px}.t{font-size:12px;color:#aaa}
    .card{background:#202027;border-radius:10px;padding:8px;margin-top:8px}
  </style>
</head>
<body><div class="wrap"><h1>Kanban-style Home</h1><div class="cols">
  <div class="col"><b>Now</b><div class="card">Finish release notes</div><div class="card">Reply to QA</div></div>
  <div class="col"><b>Next</b><div class="card">Refine dashboard mockups</div><div class="card">Calendar tuning</div></div>
  <div class="col"><b>Later</b><div class="card">Habit analytics</div><div class="card">Search polish</div></div>
</div><p class="t">Good when you want work-in-progress visibility.</p></div></body>
</html>
