<!doctype html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Option K - Split Pane</title>
<style>body{margin:0;background:#0c0c0f;color:#fff;font-family:Inter,system-ui,sans-serif}.w{max-width:900px;margin:auto;padding:16px}.split{display:grid;grid-template-columns:1.15fr 1fr;gap:12px}.c{background:#17171b;border:1px solid #2a2a33;border-radius:14px;padding:12px}.m{font-size:12px;color:#a6a6af}.list div{padding:6px 0;border-bottom:1px dashed #2a2a31}.list div:last-child{border-bottom:none}</style>
</head><body><div class="w"><h1>Split-pane Dashboard</h1><div class="split">
  <div class="c"><b>Today Timeline</b><div class="list"><div>10:00 Standup</div><div>13:00 Client sync</div><div>18:30 Repetitive task</div></div></div>
  <div><div class="c"><b>Quick Stats</b><div class="m">Tasks 8 · Events 3 · Notes 2</div></div><div class="c" style="margin-top:10px"><b>Latest Note</b><div class="m">Modified 11m ago</div></div></div>
</div></div></body></html>
