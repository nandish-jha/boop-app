<body class="bg-background text-on-surface selection:bg-primary-container min-h-screen pb-20">
<!-- Top Navigation (Shell suppressed for focused task as per rules) -->
<header class="fixed top-0 w-full z-50 bg-[#f8f9fa]/80 dark:bg-[#2b3437]/80 backdrop-blur-xl flex justify-between items-center px-8 h-20 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-['Inter'] text-2xl font-bold tracking-tight text-primary dark:text-[#d7e4ec]">New Entry</h1>
</div>
<div class="flex items-center gap-4">
<span class="text-sm font-medium text-outline-variant tracking-wider uppercase">Cancel</span>
</div>
</header>
<main class="pt-32 px-6 max-w-2xl mx-auto space-y-12">
<!-- Introduction Header -->
<section class="space-y-2">
<h2 class="text-3xl font-extrabold tracking-tighter text-on-surface">Cultivate Balance</h2>
<p class="text-on-surface-variant text-lg leading-relaxed font-light">Define the small actions that lead to a more intentional existence. Habits or supplements, each detail matters.</p>
</section>
<form class="space-y-10">
<!-- Entry Type Switcher -->
<div class="flex p-1 bg-surface-container-low rounded-xl">
<button class="flex-1 py-3 text-sm font-semibold tracking-wide rounded-lg bg-surface-container-lowest shadow-sm text-primary transition-all" type="button">HABIT</button>
<button class="flex-1 py-3 text-sm font-medium tracking-wide text-on-surface-variant hover:text-on-surface transition-all" type="button">SUPPLEMENT</button>
</div>
<!-- Main Inputs -->
<div class="space-y-8">
<!-- Name Input -->
<div class="group">
<label class="block text-[11px] font-medium uppercase tracking-[0.1em] text-outline-variant mb-3 px-1">Identity of action</label>
<input class="w-full bg-surface-container-low border-none rounded-sm px-6 py-5 text-xl font-medium focus:ring-0 focus:bg-surface-container-highest focus:border-b-2 focus:border-primary transition-all placeholder:text-outline-variant/50" placeholder="e.g., Mindful Meditation or Magnesium" type="text"/>
</div>
<!-- Frequency Selection -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-4">
<label class="block text-[11px] font-medium uppercase tracking-[0.1em] text-outline-variant px-1">Frequency</label>
<div class="flex gap-3">
<button class="px-6 py-3 rounded-full bg-primary text-on-primary text-sm font-semibold shadow-xl shadow-primary/10" type="button">Daily</button>
<button class="px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant text-sm font-medium hover:bg-surface-container-high transition-all" type="button">Weekly</button>
</div>
</div>
<div class="space-y-4">
<label class="block text-[11px] font-medium uppercase tracking-[0.1em] text-outline-variant px-1">Time of Day</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-sm px-6 py-3 text-on-surface font-medium focus:ring-0 focus:bg-surface-container-highest transition-all" type="time" value="08:00"/>
</div>
</div>
</div>
<!-- Dosage / Quantity Section (Conditional/Supplement specific layout) -->
<div class="p-8 rounded-xl bg-surface-container-low relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-6xl" data-icon="pill">pill</span>
</div>
<div class="relative z-10 space-y-4">
<label class="block text-[11px] font-medium uppercase tracking-[0.1em] text-outline-variant">Dosage Detail (Optional)</label>
<div class="flex items-end gap-4">
<input class="w-32 bg-surface-container-lowest border-none rounded-sm px-4 py-3 text-xl font-bold text-primary focus:ring-0" placeholder="500" type="text"/>
<span class="text-sm font-medium text-on-surface-variant pb-3 italic">mg / capsules</span>
</div>
</div>
</div>
<!-- Contextual Visual Element (Editorial Asymmetry) -->
<div class="grid grid-cols-12 gap-6 items-center">
<div class="col-span-8 space-y-2">
<label class="block text-[11px] font-medium uppercase tracking-[0.1em] text-outline-variant px-1">Intent Reminder</label>
<textarea class="w-full bg-transparent border-none p-0 text-sm italic text-on-surface-variant focus:ring-0 resize-none" placeholder="Why is this important to your future self?" rows="2"></textarea>
</div>
<div class="col-span-4 aspect-square rounded-xl overflow-hidden shadow-2xl shadow-primary/5">
<img class="w-full h-full object-cover grayscale-[20%] opacity-80 hover:grayscale-0 transition-all duration-700" data-alt="a minimalist glass of water on a light wood surface with soft morning shadows and a single green leaf" src="../../vendor/img/if7db7b5af037f264.png"/>
</div>
</div>
</div>
<!-- Submit Action -->
<div class="pt-8 border-t border-transparent flex flex-col gap-4">
<button class="w-full bg-primary text-on-primary py-5 rounded-xl font-bold tracking-tight text-lg shadow-2xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-600 ease-[cubic-bezier(0.25,1,0.5,1)]" type="submit">
                    Create Entry
                </button>
<p class="text-center text-[10px] text-outline-variant font-medium tracking-widest uppercase">Saved to your sanctuary local storage</p>
</div>

<div class="fixed top-0 right-0 w-1/3 h-1/2 bg-gradient-to-bl from-primary-container/20 to-transparent pointer-events-none -z-10 blur-3xl"></div>
