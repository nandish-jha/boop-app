plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nandish.productivity'
    compileSdk 34

    defaultConfig {
        applicationId "com.nandish.productivity"
        minSdk 23
        targetSdk 34
        versionCode 7
        versionName "1.0.6"
    }

    signingConfigs {
        release {
            storeFile file("../keystore.jks")
            storePassword "nandish-productivity"
            keyAlias "release"
            keyPassword "nandish-productivity"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
}
