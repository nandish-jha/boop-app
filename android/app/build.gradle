plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nandish.productivity'
    compileSdk 34

    defaultConfig {
        applicationId "com.nandish.productivity.v2"
        minSdk 23
        targetSdk 34
        versionCode 13
        versionName "1.0.11"
    }

    signingConfigs {
        release {
            storeFile file("../keystore.jks")
            storePassword "nandish-productivity"
            keyAlias "release"
            keyPassword "nandish-productivity"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

tasks.register('syncWebAssets', Copy) {
    from('../../') {
        include 'index.html'
        include 'app.js'
        include 'styles.css'
        include 'manifest.webmanifest'
        include 'sw.js'
        include 'data/**'
        include 'icons/icon-192.png'
        include 'icons/icon-512.png'
        include 'icons/icon-maskable-512.png'
    }
    into('src/main/assets/web')
}

tasks.named('preBuild') {
    dependsOn tasks.named('syncWebAssets')
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
}
