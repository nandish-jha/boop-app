<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>ProDash</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title" id="pageTitle">Home</div>
      <button class="icon-btn" id="settingsBtn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <main id="view" class="view"></main>

    <nav class="bottom-nav" role="navigation">
      <button class="nav-btn active" data-tab="home">
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3.2 3 10.5V20a1 1 0 0 0 1 1h5v-6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v6h5a1 1 0 0 0 1-1v-9.5L12 3.2z"/></svg>
        </span>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-tab="tasks">
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5 9 17.5 20 6.5"/></svg>
        </span>
        <span>Tasks</span>
      </button>
      <button class="nav-btn" data-tab="habits">
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.6 2.3c.3 2 1.2 3.4 2.4 4.7 1.6 1.7 3 3.3 3 5.9 0 4-3.1 7.1-7 7.1s-7-3.1-7-7.1c0-2 .8-3.2 1.8-4.1.6-.5 1.3-.1 1.3.6 0 2 1.3 2.4 2.3 1.5.9-.8 1.3-2.4.8-4.5-.7-3 .3-4.4 1.6-4.8.5-.1.9.2.8.7z"/></svg>
        </span>
        <span>Habits</span>
      </button>
      <button class="nav-btn" data-tab="budget">
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 7.5H5.25A1.25 1.25 0 0 1 5.25 5H20a1 1 0 0 0 0-2H5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h16a1 1 0 0 0 1-1V8.5a1 1 0 0 0-1-1zM17 15a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
        </span>
        <span>Budget</span>
      </button>
      <button class="nav-btn" data-tab="more">
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </span>
        <span>More</span>
      </button>
    </nav>

    <button class="fab" id="fab" aria-label="Add">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <div class="sheet" id="sheet" aria-hidden="true">
    <div class="sheet-backdrop" data-close></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-content" id="sheetContent"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="data/seed.js"></script>
  <script src="data/quotes.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
