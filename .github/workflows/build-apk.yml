name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa-prototype/package-lock.json

      - name: Install web dependencies
        working-directory: pwa-prototype
        run: npm ci

      - name: Build web app
        working-directory: pwa-prototype
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Copy web assets into Android project
        working-directory: pwa-prototype
        run: npx cap copy android

      - name: Make Gradle executable
        working-directory: pwa-prototype/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: pwa-prototype/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: ./gradlew assembleDebug --no-daemon

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Boop ${{ steps.sha.outputs.short }}"
          body: |
            Debug APK — built from `${{ github.sha }}`

            **Install on Android:**
            1. Download `boop-debug.apk` below
            2. Settings → Security → enable "Install unknown apps"
            3. Open the file and tap Install
          files: pwa-prototype/android/app/build/outputs/apk/debug/app-debug.apk
