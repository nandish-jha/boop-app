name: Build & Release APK

# Trigger by pushing a v* tag:  git tag v4.9.22 && git push origin v4.9.22
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v4.9.22)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Web build ─────────────────────────────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa-prototype/package-lock.json

      - name: Install web dependencies
        working-directory: pwa-prototype
        run: npm ci

      - name: Build web app
        working-directory: pwa-prototype
        run: npm run build

      # ── Prepare Android project (replaces "cap sync") ─────────────────────
      #    We manually create the generated files that cap sync would produce
      #    because they are gitignored and cap sync itself is unreliable in CI.

      - name: Set up Android Capacitor stubs
        run: |
          set -euo pipefail

          # 1. Copy built web app into Android WebView assets
          rm -rf pwa-prototype/android/app/src/main/assets/public
          mkdir -p pwa-prototype/android/app/src/main/assets/public
          cp -r pwa-prototype/dist/. pwa-prototype/android/app/src/main/assets/public/

          # 2. capacitor.config.json — read by the Capacitor WebView at runtime
          cat > pwa-prototype/android/app/src/main/assets/capacitor.config.json <<'JSON'
          {"appId":"com.prodash.boop","appName":"Boop","webDir":"public","android":{}}
          JSON

          # 3. capacitor-cordova-android-plugins — required by settings.gradle
          #    No Cordova plugins used, so this is an empty stub library.
          PLUGINS_DIR="pwa-prototype/android/capacitor-cordova-android-plugins"
          mkdir -p "$PLUGINS_DIR/src/main"

          cat > "$PLUGINS_DIR/build.gradle" <<'GRADLE'
          apply plugin: 'com.android.library'
          android {
              namespace "cordova.plugins"
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_21
                  targetCompatibility JavaVersion.VERSION_21
              }
          }
          repositories { google(); mavenCentral() }
          dependencies {}
          GRADLE

          cat > "$PLUGINS_DIR/cordova.variables.gradle" <<'GRADLE'
          ext { cordovaAndroidVersion = '14.0.1' }
          GRADLE

          cat > "$PLUGINS_DIR/src/main/AndroidManifest.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          </manifest>
          XML

      # ── Android build ─────────────────────────────────────────────────────

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        working-directory: pwa-prototype/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: pwa-prototype/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Publish release ───────────────────────────────────────────────────

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp pwa-prototype/android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/boop-${{ steps.tag.outputs.name }}.apk

      - name: Create GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Boop ${{ steps.tag.outputs.name }}"
          body: |
            ## Boop ${{ steps.tag.outputs.name }}

            **What's new:** see commit history above.

            **Install on Android:**
            1. Download `boop-${{ steps.tag.outputs.name }}.apk` below
            2. Android Settings → Apps → Special app access → Install unknown apps → allow Files / your browser
            3. Open the APK and tap Install

            > Debug build — safe to install, but Android will show an "unverified" warning.
          files: artifacts/boop-${{ steps.tag.outputs.name }}.apk
          make_latest: true
