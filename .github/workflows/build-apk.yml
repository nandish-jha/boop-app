name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa-prototype/package-lock.json

      - name: Install web dependencies
        working-directory: pwa-prototype
        run: npm ci

      - name: Build web app
        working-directory: pwa-prototype
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Sync web assets into Android project
        working-directory: pwa-prototype
        run: npx cap sync android

      - name: Make Gradle executable
        working-directory: pwa-prototype/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: pwa-prototype/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp pwa-prototype/android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/boop-${{ github.ref_name }}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Boop ${{ github.ref_name }}"
          body: |
            ## Boop ${{ github.ref_name }}

            Today screen · Tasks · Library (Notes / Journal / Quotes) · Habits with streaks

            Voice or text → free rule-based NLP → TASK / NOTE / JOURNAL / QUOTE — no AI API key needed.

            **Install on Android:**
            1. Download `boop-${{ github.ref_name }}.apk` below
            2. Settings → Apps → Special app access → Install unknown apps → allow your browser/files app
            3. Open the file and tap Install
          files: artifacts/boop-${{ github.ref_name }}.apk
