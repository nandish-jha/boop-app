name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa-prototype/package-lock.json

      - name: Install web dependencies
        working-directory: pwa-prototype
        run: npm ci

      - name: Build web app
        working-directory: pwa-prototype
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        working-directory: pwa-prototype
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        working-directory: pwa-prototype
        run: npx cap sync android

      - name: Make Gradle executable
        working-directory: pwa-prototype/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: pwa-prototype/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp pwa-prototype/android/app/build/outputs/apk/debug/app-debug.apk dist/boop-debug.apk

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Boop ${{ steps.sha.outputs.short }}
          body: |
            Debug APK built from commit ${{ github.sha }}

            **Install on Android:**
            1. Download `boop-debug.apk` below
            2. On your phone: Settings → Security → allow "Install unknown apps"
            3. Open the downloaded file and install
          files: dist/boop-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
